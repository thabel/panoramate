name: Deploy Next.js App to cPanel (Safe Prisma Workflow)

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            cd ${{ secrets.SERVER_DIR }}

            echo "=================================="
            echo "1. Activate Node (cPanel env)"
            echo "=================================="
            source /home/bativyma/nodevenv/bativy/20/bin/activate

            echo "Node version:"
            node -v

            echo "=================================="
            echo "2. Clean old build artifacts"
            echo "=================================="
            rm -rf .next
            rm -rf node_modules/.prisma
            rm -rf prisma/migrations/.lock || true

            echo "=================================="
            echo "3. Install dependencies"
            echo "=================================="
            npm install --production=false

            echo "=================================="
            echo "4. Generate Prisma client"
            echo "=================================="
            npx prisma generate

            echo "=================================="
            echo "5. Run migrations (safe)"
            echo "=================================="
            npx prisma migrate deploy

            echo "=================================="
            echo "6. Build Next.js"
            echo "=================================="
            npm run build

            echo "=================================="
            echo "7. Restart app"
            echo "=================================="
            mkdir -p tmp && touch tmp/restart.txt

            echo "DEPLOYMENT SUCCESS"