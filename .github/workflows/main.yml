name: Deploy Next.js App to cPanel

on:
  push:
    branches: master # Se déclenche lors d'un push sur la branche master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        # Indispensable pour que le build Next.js reconnaisse Prisma
        run: npx prisma generate

      - name: Build Next.js Project
        # On build sur GitHub pour ne pas saturer le CPU du cPanel
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # On exclut les fichiers inutiles et node_modules (trop lourd)
          exclude: |
            **/.git*
            **/.github*
            node_modules/**
            src/**
            README.md
            .env
          server-dir: ${{ secrets.SERVER_DIR }}/

      - name: SSH Post-Deployment (SAFE)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.SERVER_DIR }}
            source /home/bativyma/nodevenv/bativy/20/bin/activate

            # 🔒 Prevent double execution
            if [ -f migration.lock ]; then
              echo "Migration already running"
              exit 0
            fi

            touch migration.lock

            # 🧠 Ensure cleanup even if crash / timeout happens
            trap 'rm -f migration.lock' EXIT

            echo "Running Prisma migration safely..."

            # ⚡ HARD LIMIT to prevent process explosion
            timeout 120s ./node_modules/.bin/prisma migrate deploy

            EXIT_CODE=$?

            echo "Migration finished with code $EXIT_CODE"

            # 🔄 restart app safely
            mkdir -p tmp && touch tmp/restart.txt

            exit $EXIT_CODE